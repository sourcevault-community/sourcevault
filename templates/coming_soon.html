<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>SourceVault - Coming Soon</title>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <!-- Responsive Coming Soon Box -->
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 max-w-md w-full mx-4 text-center transform transition-all hover:scale-[1.02]">
        <!-- Brand Logo -->
        <div class="mb-6">
            <img src="/logo.png" alt="SourceVault Logo" class="w-64 h-auto mx-auto drop-shadow-2xl">
        </div>

        <!-- Heading & Status -->
        <p class="text-[#7D56F4] font-semibold mb-6 uppercase tracking-widest text-sm">Coming Soon</p>
        
        <!-- Description -->
        <p class="text-slate-400 leading-relaxed text-sm mb-8">
            We're building the ultimate secure repository management system. Something big is just around the corner. Stay tuned for a more secure future.
        </p>

        <!-- Links -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="https://www.sourcevault.dev" target="_blank" class="px-6 py-2 bg-[#7D56F4] hover:bg-[#6a44e0] text-white text-sm font-bold rounded-lg transition-colors shadow-lg shadow-[#7D56F4]/20">
                Homepage
            </a>
            <a href="https://github.com/sourcevault-community/sourcevault" target="_blank" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold rounded-lg transition-colors border border-slate-600">
                GitHub
            </a>
        </div>
    </div>

    <!-- Copyright Footer -->
    <footer class="absolute bottom-6 w-full text-center">
        <p class="text-slate-500 text-xs tracking-wide">
            &copy; 2026 The SourceVault Authors. All rights reserved.
        </p>
    </footer>
</body>
</html>
